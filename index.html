<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tải ứng dụng của chúng tôi</title>
    
    <meta property="og:title" content="Tải ứng dụng AppName">
    <meta property="og:description" content="Nhấn để tải ứng dụng trên App Store hoặc Google Play">
    <meta property="og:image" content="link-anh-logo-cua-ban.png">

    <script>
        function smartRedirect() {
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            
            // Cấu hình link Store của bạn ở đây
            const IOS_URL = "https://apps.apple.com/vn/app/saigon-co-op-events/id1460078957?l=vi";
            const ANDROID_URL = "https://play.google.com/store/apps/details?id=vn.saigonco_op.events&pcampaignid=web_share";
            const PC_URL = "https://www.saigonco-op.vn/Event"; // Link cho máy tính

            if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
                window.location.replace(IOS_URL);
            } else if (/android/i.test(userAgent)) {
                window.location.replace(ANDROID_URL);
            } else {
                window.location.replace(PC_URL);
            }
        }
        // Chạy hàm ngay khi trang load
        window.onload = smartRedirect;
    </script>
</head>
<body>
    <div style="text-align: center; margin-top: 50px; font-family: sans-serif;">
        <h2>Đang chuyển hướng bạn đến cửa hàng ứng dụng...</h2>
        <p>Nếu không tự động chuyển, hãy <a href="https://yourwebsite.com">bấm vào đây</a>.</p>
    </div>
</body>
</html>
